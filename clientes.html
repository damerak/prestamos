<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestorio - Listado de Clientes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121420;
            --card-bg: #1b1f2d;
            --input-bg: #24293a;
            --text-main: #e0e0e0;
            --text-dim: #8b8ea1;
            --accent: #5d5fef;
            --danger: #ef4444;
            --wa-color: #25d366;
            --border: #2e344a;
            --note-color: #ffcc00;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 40px 20px; }
        .container { width: 100%; max-width: 1000px; margin: 0 auto; animation: fadeIn 0.6s ease; }
        
        /* BOTÓN VOLVER */
        .btn-top-inicio {
            display: inline-flex; align-items: center; background: var(--accent); color: white;
            padding: 10px 20px; border-radius: 10px; text-decoration: none; font-weight: 600;
            margin-bottom: 30px; transition: 0.3s;
        }
        .btn-top-inicio:hover { opacity: 0.8; transform: translateX(-5px); }

        header { display: flex; flex-direction: column; gap: 15px; margin-bottom: 40px; }
        h1 { font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); }

        .search-box {
            display: flex; align-items: center; background: var(--card-bg);
            padding: 10px 20px; border-radius: 12px; border: 1px solid var(--border);
        }
        .search-box input { background: transparent; border: none; color: white; padding: 10px; width: 100%; outline: none; font-size: 1rem; }
        
        /* FILTROS CHECKBOX */
        .filter-controls { display: flex; gap: 20px; margin-top: 5px; padding-left: 5px; flex-wrap: wrap; }
        .filter-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.85rem; color: var(--text-dim); transition: 0.3s; }
        .filter-label:hover { color: var(--accent); }
        .filter-label input { accent-color: var(--accent); width: 16px; height: 16px; }

        /* GRUPOS DE BARRIO */
        .barrio-group { margin-bottom: 15px; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
        .barrio-header {
            background: var(--card-bg); padding: 15px 20px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; transition: 0.3s;
        }
        .barrio-header:hover { background: var(--input-bg); }
        .barrio-header h3 { font-size: 0.9rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        .barrio-content { display: none; padding: 15px; background: #0e101a; flex-direction: column; gap: 10px; }
        .barrio-group.open .barrio-content { display: flex; }
        .barrio-group.open .barrio-header { border-bottom: 1px solid var(--border); }
        .barrio-header .arrow { transition: 0.3s; color: var(--text-dim); }
        .barrio-group.open .arrow { transform: rotate(180deg); color: var(--accent); }

        /* CLIENT CARDS */
        .client-list { display: flex; flex-direction: column; gap: 10px; }
        .client-card {
            background: var(--card-bg); border-radius: 12px; padding: 15px 20px;
            border: 1px solid var(--border); transition: 0.3s ease; cursor: pointer;
        }
        .client-card:hover { border-color: var(--accent); }
        .client-card.active { border-color: var(--accent); background: #1b1f2d; }

        .client-header { display: flex; justify-content: space-between; align-items: center; }
        .client-header h2 { font-size: 1rem; color: var(--text-main); display: flex; align-items: center; gap: 12px; margin: 0; font-weight: 400; }
        .client-card.active h2 { font-weight: 600; color: white; }

        .client-content { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); animation: slideDown 0.3s ease; }
        .client-card.active .client-content { display: block; }

        .note-display { font-size: 0.85rem; color: var(--note-color); font-style: italic; margin-bottom: 15px; padding-left: 10px; border-left: 2px solid var(--note-color); }

        .details-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .detail-item label { font-size: 0.65rem; text-transform: uppercase; color: var(--text-dim); display: block; }
        .detail-item span { font-size: 0.9rem; color: #fff; }

        .actions { display: flex; gap: 10px; padding-top: 15px; border-top: 1px dashed var(--border); flex-wrap: wrap; }
        .action-btn { display: flex; flex-direction: column; align-items: center; background: none; border: none; cursor: pointer; color: var(--text-dim); transition: 0.3s; min-width: 55px; }
        .action-btn span.material-icons-round { background: var(--input-bg); padding: 10px; border-radius: 10px; font-size: 20px; margin-bottom: 5px; }
        .action-btn small { font-size: 0.6rem; text-transform: uppercase; font-weight: 600; }
        .action-btn:hover { color: white; }

        .edit-fields, .note-fields { display: none; margin-top: 20px; padding: 15px; background: #121420; border-radius: 10px; border: 1px solid var(--border); }
        input.edit-input { width: 100%; padding: 10px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: white; margin-bottom: 10px; font-size: 0.9rem; outline: none; }
        .btn-save { padding: 10px; border: none; border-radius: 8px; background: var(--accent); color: white; cursor: pointer; font-weight: 600; width: 100%; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-top-inicio">
        <span class="material-icons-round" style="margin-right:8px">home</span> INICIO
    </a>

    <header>
        <h1>Listado de Clientes</h1>
        <div class="search-box">
            <span class="material-icons-round">search</span>
            <input type="text" id="buscador" placeholder="Buscar por nombre, cédula o barrio..." oninput="renderizarClientes()">
        </div>
        <div class="filter-controls">
            <label class="filter-label">
                <input type="checkbox" id="checkBarrio" onchange="renderizarClientes()"> Agrupar por Barrio
            </label>
            <label class="filter-label">
                <input type="checkbox" id="checkNotas" onchange="renderizarClientes()"> Ver solo con Notas
            </label>
        </div>
    </header>

    <div id="clientContainer"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCarhhvBeuECGQL_6VU-huoK0hqu3q_lZ4",
        authDomain: "prestamos-ba860.firebaseapp.com",
        projectId: "prestamos-ba860",
        storageBucket: "prestamos-ba860.firebasestorage.app",
        messagingSenderId: "854942370995",
        appId: "1:854942370995:web:06aba4cd63c03d12fb34c6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let clientes = [];

    async function obtenerClientes() {
        const querySnapshot = await getDocs(collection(db, "clientes"));
        clientes = [];
        querySnapshot.forEach((doc) => {
            clientes.push({ id: doc.id, ...doc.data() });
        });
        renderizarClientes();
    }

    function renderizarClientes() {
        const contenedor = document.getElementById('clientContainer');
        const filtro = document.getElementById('buscador').value.toLowerCase();
        const agruparBarrio = document.getElementById('checkBarrio').checked;
        const soloConNotas = document.getElementById('checkNotas').checked;
        
        contenedor.innerHTML = "";

        // Filtrar
        let filtrados = clientes.filter(c => {
            const matchTxt = c.nombres.toLowerCase().includes(filtro) || 
                             c.cedula.toString().includes(filtro) ||
                             (c.barrio && c.barrio.toLowerCase().includes(filtro));
            const matchNota = soloConNotas ? (c.nota && c.nota.trim() !== "") : true;
            return matchTxt && matchNota;
        });

        if (agruparBarrio) {
            // Lógica de agrupación
            const grupos = filtrados.reduce((acc, c) => {
                const b = (c.barrio || "SIN BARRIO").toUpperCase();
                if (!acc[b]) acc[b] = [];
                acc[b].push(c);
                return acc;
            }, {});

            Object.keys(grupos).sort().forEach(barrioNombre => {
                const barrioId = btoa(barrioNombre).replace(/=/g, ""); 
                const section = document.createElement('div');
                section.className = 'barrio-group';
                section.id = `group-${barrioId}`;
                
                section.innerHTML = `
                    <div class="barrio-header" onclick="document.getElementById('group-${barrioId}').classList.toggle('open')">
                        <h3><span class="material-icons-round">location_on</span> ${barrioNombre}</h3>
                        <div style="display:flex; align-items:center; gap:10px">
                            <span style="font-size:0.7rem; opacity:0.5">${grupos[barrioNombre].length}</span>
                            <span class="material-icons-round arrow">expand_more</span>
                        </div>
                    </div>
                    <div class="barrio-content"></div>
                `;

                const contentDiv = section.querySelector('.barrio-content');
                grupos[barrioNombre].sort((a,b) => a.nombres.localeCompare(b.nombres)).forEach(c => {
                    contentDiv.appendChild(crearCard(c));
                });
                contenedor.appendChild(section);
            });
        } else {
            // Lista simple A-Z
            const listDiv = document.createElement('div');
            listDiv.className = 'client-list';
            filtrados.sort((a,b) => a.nombres.localeCompare(b.nombres)).forEach(c => {
                listDiv.appendChild(crearCard(c));
            });
            contenedor.appendChild(listDiv);
        }
    }

    function crearCard(c) {
        const card = document.createElement('div');
        card.className = 'client-card';
        card.onclick = (e) => {
            if (e.target.closest('.actions') || e.target.closest('.edit-fields') || e.target.closest('.note-fields')) return;
            card.classList.toggle('active');
        };

        card.innerHTML = `
            <div class="client-header">
                <h2><span class="material-icons-round" style="color:var(--accent); font-size:1.2rem">person</span> ${c.nombres}</h2>
                <span class="material-icons-round expand-icon" style="font-size:1.2rem; color:var(--text-dim)">expand_more</span>
            </div>

            <div class="client-content">
                ${c.nota ? `<div class="note-display">Nota: ${c.nota}</div>` : ''}
                
                <div class="details-grid">
                    <div class="detail-item"><label>Cédula</label><span>${c.cedula}</span></div>
                    <div class="detail-item"><label>Celular</label><span>${c.celular}</span></div>
                    <div class="detail-item"><label>Barrio</label><span>${c.barrio || 'N/A'}</span></div>
                    <div class="detail-item"><label>Dirección</label><span>${c.direccion || 'N/A'}</span></div>
                </div>

                <div class="actions">
                    <button class="action-btn" onclick="toggleSub('edit-${c.id}')"><span class="material-icons-round" style="color:var(--accent)">edit</span><small>Editar</small></button>
                    <button class="action-btn" onclick="toggleSub('note-${c.id}')"><span class="material-icons-round" style="color:var(--note-color)">sticky_note_2</span><small>Nota</small></button>
                    <button class="action-btn" onclick="enviarWA('${c.celular}')"><span class="material-icons-round" style="color:var(--wa-color)">chat</span><small>WA</small></button>
                    <button class="action-btn" onclick="eliminarCliente('${c.id}')"><span class="material-icons-round" style="color:var(--danger)">delete</span><small>Borrar</small></button>
                </div>

                <div class="edit-fields" id="edit-${c.id}">
                    <input type="text" class="edit-input" id="in-nom-${c.id}" value="${c.nombres}">
                    <input type="text" class="edit-input" id="in-cel-${c.id}" value="${c.celular}">
                    <input type="text" class="edit-input" id="in-bar-${c.id}" value="${c.barrio || ''}" placeholder="Barrio">
                    <input type="text" class="edit-input" id="in-dir-${c.id}" value="${c.direccion || ''}" placeholder="Dirección">
                    <button class="btn-save" onclick="guardarEdicion('${c.id}')">ACTUALIZAR</button>
                </div>

                <div class="note-fields" id="note-${c.id}">
                    <input type="text" class="edit-input" id="in-note-${c.id}" placeholder="Nota..." value="${c.nota || ''}">
                    <button class="btn-save" style="background:var(--note-color); color:#000" onclick="guardarNota('${c.id}')">GUARDAR NOTA</button>
                </div>
            </div>
        `;
        return card;
    }

    // GLOBALES
    window.toggleSub = (id) => {
        const el = document.getElementById(id);
        const isVisible = el.style.display === 'block';
        el.parentElement.querySelectorAll('.edit-fields, .note-fields').forEach(d => d.style.display = 'none');
        el.style.display = isVisible ? 'none' : 'block';
    }

    window.guardarEdicion = async (id) => {
        try {
            await updateDoc(doc(db, "clientes", id), {
                nombres: document.getElementById(`in-nom-${id}`).value,
                celular: document.getElementById(`in-cel-${id}`).value,
                barrio: document.getElementById(`in-bar-${id}`).value,
                direccion: document.getElementById(`in-dir-${id}`).value
            });
            obtenerClientes();
        } catch (e) { console.error(e); }
    }

    window.guardarNota = async (id) => {
        try {
            await updateDoc(doc(db, "clientes", id), { nota: document.getElementById(`in-note-${id}`).value });
            obtenerClientes();
        } catch (e) { console.error(e); }
    }

    window.eliminarCliente = async (id) => {
        if(confirm("¿Eliminar cliente?")) {
            try {
                await deleteDoc(doc(db, "clientes", id));
                obtenerClientes();
            } catch (e) { console.error(e); }
        }
    }

    window.enviarWA = (tel) => window.open(`https://wa.me/57${tel.replace(/\D/g, "")}`, '_blank');

    window.onload = obtenerClientes;
</script>
</body>
</html>
