<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reimpresión de Recibos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Firebase App y Firestore SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-color: #121420;
            --card-bg: #1b1f2d;
            --input-bg: #24293a;
            --text-color: #e0e0e0;
            --accent-color: #5d5fef;
            --border-color: #2e344a;
            --nuevo-color: #b18cf0;
            --abono-color: #4ade80;
            --cancelado-color: #f43f5e;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 40px 20px; }
        .container { width: 100%; max-width: 900px; margin: 0 auto; animation: fadeIn 0.6s ease; }
        
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .btn-regresar {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-regresar:hover { color: white; transform: translateX(-5px); }

        .btn-reset-log {
            background: none;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-reset-log:hover { background: var(--danger); color: white; }

        h2 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; color: #8b8ea1; font-weight: 600; }

        .dia-tag { background: var(--input-bg); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; color: var(--accent-color); margin-bottom: 30px; display: inline-block; border: 1px solid var(--border-color); }

        .group-section { margin-bottom: 40px; }
        .group-title { 
            display: flex; align-items: center; gap: 10px; 
            font-size: 0.9rem; font-weight: 600; text-transform: uppercase; 
            margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color);
        }

        .recibo-card {
            background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px;
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; transition: 0.3s;
        }
        .recibo-card:hover { border-color: var(--accent-color); transform: translateX(5px); }

        .recibo-info { display: flex; flex-direction: column; gap: 3px; }
        .r-cliente { font-weight: 600; font-size: 1rem; color: white; }
        .r-detalle { font-size: 0.8rem; color: #7a829a; }
        .r-monto { font-weight: 600; font-size: 1.1rem; }

        .btn-reimprimir {
            padding: 10px 18px; background: var(--accent-color); color: white;
            border: none; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 700;
            transition: 0.3s;
        }
        .btn-reimprimir:hover { background: #4a4cd4; transform: scale(1.05); }

        .tipo-nuevo { color: var(--nuevo-color); }
        .tipo-abono { color: var(--abono-color); }
        .tipo-cancelado { color: var(--cancelado-color); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="top-nav">
        <a href="index.html" class="btn-regresar">← Volver al Inicio</a>
        <button class="btn-reset-log" onclick="reiniciarHistorial()">Limpiar Historial de Facturas</button>
    </div>
    
    <h2>Reimpresión de Facturas</h2>
    <div class="dia-tag" id="fechaHoy">Recibos de Hoy: --/--/----</div>

    <div class="group-section">
        <div class="group-title tipo-nuevo">● Préstamos Creados</div>
        <div id="listaNuevos"></div>
    </div>

    <div class="group-section">
        <div class="group-title tipo-abono">● Abonos y Cobros</div>
        <div id="listaAbonos"></div>
    </div>

    <div class="group-section">
        <div class="group-title tipo-cancelado">● Cancelaciones Totales</div>
        <div id="listaCancelaciones"></div>
    </div>
</div>

<script>
    // Configuración de Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCarhhvBeuECGQL_6VU-huoK0hqu3q_lZ4",
        authDomain: "prestamos-ba860.firebaseapp.com",
        projectId: "prestamos-ba860",
        storageBucket: "prestamos-ba860.firebasestorage.app",
        messagingSenderId: "854942370995",
        appId: "1:854942370995:web:06aba4cd63c03d12fb34c6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const hoy = new Date().toLocaleDateString();
    document.getElementById('fechaHoy').textContent = `Recibos del Día: ${hoy}`;

    async function renderizarHistorial() {
        const dN = document.getElementById('listaNuevos');
        const dA = document.getElementById('listaAbonos');
        const dC = document.getElementById('listaCancelaciones');

        dN.innerHTML = "<p style='color:#7a829a;'>Cargando registros...</p>";
        dA.innerHTML = ""; dC.innerHTML = "";

        try {
            const snapshot = await db.collection('historial_impresiones')
                                     .where('fecha', '==', hoy)
                                     .get();

            dN.innerHTML = ""; 

            if (snapshot.empty) {
                dN.innerHTML = "<p style='color:#7a829a; font-style:italic;'>No hay registros para hoy.</p>";
                return;
            }

            const registros = [];
            snapshot.forEach(doc => {
                registros.push(doc.data());
            });

            registros.sort((a, b) => b.hora.localeCompare(a.hora));

            registros.forEach(item => {
                const card = document.createElement('div');
                card.className = 'recibo-card';
                card.innerHTML = `
                    <div class="recibo-info">
                        <span class="r-cliente">${item.cliente.toUpperCase()}</span>
                        <span class="r-detalle">${item.hora} | ${item.tipo === 'nuevo' ? 'Apertura' : 'Pago'}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:20px;">
                        <span class="r-monto ${getClase(item.tipo)}">${formatear(item.monto)}</span>
                        <button class="btn-reimprimir" onclick='reimprimir(${JSON.stringify(item)})'>IMPRIMIR</button>
                    </div>
                `;
                
                if (item.tipo === 'nuevo') dN.appendChild(card);
                else if (item.tipo === 'abono') dA.appendChild(card);
                else dC.appendChild(card);
            });

        } catch (error) {
            console.error("Error cargando historial:", error);
            dN.innerHTML = `<p style='color:var(--danger);'>Error de conexión: ${error.message}</p>`;
        }
    }

    async function reiniciarHistorial() {
        if(confirm("¿Estás seguro de limpiar el historial de hoy en la base de datos?")) {
            try {
                const snapshot = await db.collection('historial_impresiones')
                                         .where('fecha', '==', hoy)
                                         .get();
                
                const batch = db.batch();
                snapshot.docs.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                
                alert("Historial del día eliminado.");
                renderizarHistorial();
            } catch (error) {
                console.error("Error al borrar:", error);
                alert("No se pudo limpiar el historial.");
            }
        }
    }

    function reimprimir(item) {
        const emp = JSON.parse(localStorage.getItem('datosEmpresa')) || { nombre: "MI NEGOCIO", telefono: "000", ciudad: "CIUDAD" };
        
        // Ajustes específicos para GOOJPRT PT210 (58mm papel, ~48mm printable)
        const cf = JSON.parse(localStorage.getItem('ticketConfig')) || { 
            width: 48, // Cambiado a 48 para evitar cortes laterales
            marginTop: 0, 
            marginSide: 0, 
            fontSize: 11, 
            separator: "--------------------------------", 
            bold: false 
        };

        const win = window.open('', '_blank');
        let ticketBody = "";
        
        if (item.tipo === 'nuevo') {
            ticketBody = `
                <div class="bold">** REIMPRESIÓN **</div>
                <div class="bold">NUEVO PRÉSTAMO</div>
                <div class="sep">${cf.separator}</div>
                <div style="text-align:left">
                    FECHA: ${item.fecha}<br>
                    CLIENTE: ${item.cliente.toUpperCase()}
                </div>
                <div class="sep">${cf.separator}</div>
                <div class="row"><span>MONTO:</span><span>${formatear(item.monto)}</span></div>
                <div class="row"><span>INTERÉS:</span><span>${item.porcentaje || '20'}%</span></div>
                <div class="row"><span>CUOTAS:</span><span>${item.cuotas || '--'}</span></div>
                <div class="sep">${cf.separator}</div>
                <div class="row bold"><span>ENTREGADO:</span><span>${formatear(item.monto * 0.95)}</span></div>
                <div class="box">
                    <div class="bold">TOTAL A PAGAR</div>
                    <div class="bold" style="font-size: 1.2em;">${item.total || formatear(item.saldo)}</div>
                </div>
            `;
        } else {
            ticketBody = `
                <div class="bold">** REIMPRESIÓN **</div>
                <div class="bold">RECIBO DE CAJA</div>
                <div class="sep">${cf.separator}</div>
                <div style="text-align:left">
                    FECHA: ${item.fecha}<br>
                    HORA: ${item.hora}<br>
                    CLIENTE: ${item.cliente.toUpperCase()}
                </div>
                <div class="sep">${cf.separator}</div>
                <div class="box bold">VALOR PAGADO: ${formatear(item.monto)}</div>
                <div class="bold">NUEVO SALDO: ${formatear(item.saldo)}</div>
            `;
        }

        win.document.write(`
            <html>
            <head>
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <style>
                    @page { 
                        size: 58mm auto; 
                        margin: 0; 
                    }
                    body { 
                        width: ${cf.width}mm; 
                        margin: 0 auto; 
                        padding: 5px; 
                        text-align: center; 
                        color: #000;
                        background-color: #fff;
                        font-family: 'monospace';
                        font-size: ${cf.fontSize}px;
                        line-height: 1.2;
                    }
                    .bold { font-weight: bold; }
                    .sep { margin: 4px 0; white-space: nowrap; overflow: hidden; }
                    .row { display: flex; justify-content: space-between; }
                    .box { border: 1px solid #000; padding: 4px; margin: 6px 0; }
                    /* Forzar impresión de colores si los hubiera */
                    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                </style>
            </head>
            <body>
                <div class="bold">${emp.nombre.toUpperCase()}</div>
                <div>TEL: ${emp.telefono}</div>
                <div>${emp.ciudad.toUpperCase()}</div>
                <div class="sep">${cf.separator}</div>
                ${ticketBody}
                <div class="sep">${cf.separator}</div>
                <div style="margin-top:10px;">*** Gracias por su confianza ***</div>
                <div style="height: 50px;">.</div> <!-- Espacio para el corte manual -->
                <script>
                    window.onload = function() { 
                        window.print(); 
                        setTimeout(() => { window.close(); }, 1000); 
                    }
                <\/script>
            </body>
            </html>
        `);
        win.document.close();
    }

    function getClase(t) { return t === 'nuevo' ? 'tipo-nuevo' : (t === 'abono' ? 'tipo-abono' : 'tipo-cancelado'); }
    
    function formatear(n) { 
        if(!n) return "$0";
        let valor = typeof n === 'string' ? parseFloat(n.replace(/[^0-9.-]+/g,"")) : n;
        return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(valor || 0); 
    }

    window.onload = renderizarHistorial;
</script>
</body>
</html>
