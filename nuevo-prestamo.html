<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Préstamo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg-color: #121420; --input-bg: #1b1f2d; --input-border: #2e344a; --text-main: #e0e0e0; --text-dim: #8b8ea1; --accent: #5d5fef; --accent-hover: #4a4cd4; --success: #4ade80; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .btn-regresar { display: inline-block; margin-bottom: 15px; color: var(--text-dim); text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .btn-regresar:hover { color: var(--accent); }
        .card { width: 100%; max-width: 600px; animation: fadeIn 0.6s ease-out; }
        h2 { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; color: #b18cf0; font-weight: 600; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        input, select { width: 100%; padding: 12px 15px; background-color: var(--input-bg); border: 1px solid var(--input-border); border-radius: 8px; color: white; font-size: 1rem; outline: none; transition: 0.3s; }
        .summary-box { margin-top: 25px; background-color: #0b0d14; padding: 20px; border-radius: 8px; border-bottom: 2px solid var(--input-border); }
        .summary-line { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.85rem; color: var(--text-dim); text-transform: uppercase; }
        .total-row { margin-top: 15px; padding-top: 15px; border-top: 1px solid #2e344a; display: flex; justify-content: space-between; align-items: center; }
        .total-label { color: var(--accent); font-weight: 600; font-size: 1.2rem; }
        .total-amount { font-size: 1.4rem; font-weight: 600; color: #fff; }
        button { width: 100%; margin-top: 20px; padding: 16px; background-color: var(--accent); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        #iframeImpresion { position: absolute; width: 0; height: 0; border: none; visibility: hidden; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>
<div class="card">
    <a href="index.html" class="btn-regresar">← Volver al Inicio</a>
    <h2>Crear Préstamo</h2>
    <form id="prestamoForm">
        <div class="form-grid">
            <select id="selectCliente" class="full-width" required><option value="">Seleccionar Cliente...</option></select>
            <input type="text" id="monto" placeholder="Monto (Ej: 600.000)" required>
            <input type="number" id="porcentaje" placeholder="%" value="20" required>
            <input type="number" id="cuotas" class="full-width" placeholder="Número de cuotas" required>
        </div>
        <div class="summary-box">
            <div class="summary-line"><span>Fecha Inicio:</span><span id="txtFecha">-</span></div>
            <div class="summary-line"><span>Bono Rifa (5%):</span><span id="txtBono">$0</span></div>
            <div class="summary-line"><span>ENTREGADO AL CLIENTE:</span><span id="txtEntregado" style="color:var(--success); font-weight:bold;">$0</span></div>
            <div class="summary-line"><span>Valor Cuota:</span><span id="txtCuota">$0</span></div>
            <div class="total-row"><span class="total-label">TOTAL A PAGAR:</span><span class="total-amount" id="txtTotal">$0</span></div>
        </div>
        <button type="submit" id="btnGuardar">Guardar e Imprimir</button>
    </form>
</div>
<iframe id="iframeImpresion"></iframe>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCarhhvBeuECGQL_6VU-huoK0hqu3q_lZ4", authDomain: "prestamos-ba860.firebaseapp.com", projectId: "prestamos-ba860", storageBucket: "prestamos-ba860.firebasestorage.app", messagingSenderId: "854942370995", appId: "1:854942370995:web:06aba4cd63c03d12fb34c6" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const form = document.getElementById('prestamoForm');
    const selectCliente = document.getElementById('selectCliente');
    const inputMonto = document.getElementById('monto');
    const inputPorcentaje = document.getElementById('porcentaje');
    const inputCuotas = document.getElementById('cuotas');
    const txtCuota = document.getElementById('txtCuota');
    const txtTotal = document.getElementById('txtTotal');

    async function cargarClientes() {
        const snapshot = await db.collection('clientes').get();
        snapshot.forEach(doc => { let c = doc.data(); let o = document.createElement('option'); o.value = c.nombres; o.textContent = c.nombres; selectCliente.appendChild(o); });
        document.getElementById('txtFecha').textContent = new Date().toLocaleDateString();
    }

    function calcular() {
        let monto = parseFloat(inputMonto.value.replace(/\./g, "")) || 0;
        let porc = parseFloat(inputPorcentaje.value) || 0;
        let cuotas = parseInt(inputCuotas.value) || 0;
        let total = monto + (monto * (porc / 100));
        let vCuota = cuotas > 0 ? (total / cuotas) : 0;
        document.getElementById('txtBono').textContent = formatearCOP(monto * 0.05);
        document.getElementById('txtEntregado').textContent = formatearCOP(monto * 0.95);
        txtCuota.textContent = formatearCOP(vCuota);
        txtTotal.textContent = formatearCOP(total);
    }

    inputMonto.addEventListener('input', (e) => { e.target.value = e.target.value.replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, "."); calcular(); });
    [inputPorcentaje, inputCuotas].forEach(el => el.addEventListener('input', calcular));

    function formatearCOP(n) { return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(n); }

    function imprimirNuevoPrestamo(datos) {
        const emp = JSON.parse(localStorage.getItem('datosEmpresa')) || { nombre: "EMPRESA", telefono: "000", ciudad: "BOGOTA" };
        const cf = JSON.parse(localStorage.getItem('ticketConfig')) || { width: 58, marginTop: 10, marginSide: 5, fontSize: 12, separator: "--------------------------------" };
        const iframe = document.getElementById('iframeImpresion');
        const win = iframe.contentWindow;
        const doc = win.document;
        doc.open();
        doc.write(`<html><head><style>@page { margin: 0; size: auto; } body { width: 48mm; margin: 0 auto; padding: ${cf.marginTop}px 0; font-family: 'Courier New', monospace; font-size: ${cf.fontSize}px; text-align: center; color: #000; line-height: 1.2; } .bold { font-weight: bold; } .sep { margin: 5px 0; overflow: hidden; white-space: nowrap; } .row { display: flex; justify-content: space-between; } .box { border: 1px solid #000; padding: 5px; margin: 8px 0; }</style></head>
            <body><div class="bold">${emp.nombre.toUpperCase()}</div><div>TEL: ${emp.telefono}</div><div>${emp.ciudad.toUpperCase()}</div><div class="sep">${cf.separator}</div><div class="bold">NUEVO PRÉSTAMO</div><div class="sep">${cf.separator}</div>
            <div style="text-align:left">FECHA: ${new Date().toLocaleDateString()}<br>CLIENTE: ${datos.cliente.toUpperCase()}</div><div class="sep">${cf.separator}</div>
            <div class="row"><span>MONTO:</span><span>${formatearCOP(datos.monto)}</span></div>
            <div class="row"><span>INTERÉS:</span><span>${datos.porcentaje}%</span></div>
            <div class="row"><span>CUOTAS:</span><span>${datos.cuotas}</span></div><div class="sep">${cf.separator}</div>
            <div class="row bold"><span>ENTREGADO:</span><span>${formatearCOP(datos.monto * 0.95)}</span></div>
            <div class="box"><div class="bold">TOTAL A PAGAR</div><div class="bold" style="font-size: 1.2em;">${datos.total}</div></div>
            <div class="bold">VALOR CUOTA: ${txtCuota.textContent}</div><div class="sep">${cf.separator}</div>
            <div style="margin-top:10px;">*** Gracias por su confianza ***</div><div style="height:50px">.</div></body></html>`);
        doc.close();
        setTimeout(() => { win.focus(); win.print(); }, 500);
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const prestamo = { id: Date.now().toString(), cliente: selectCliente.value, monto: parseFloat(inputMonto.value.replace(/\./g, "")), porcentaje: inputPorcentaje.value, cuotas: inputCuotas.value, total: txtTotal.textContent, saldo: parseFloat(txtTotal.textContent.replace(/[^0-9]/g,"")), fecha: new Date().toLocaleDateString() };
        await db.collection('prestamos').doc(prestamo.id).set(prestamo);
        await db.collection('historial_impresiones').add({...prestamo, tipo: 'nuevo', hora: new Date().toLocaleTimeString()});
        imprimirNuevoPrestamo(prestamo);
        setTimeout(() => window.location.href = 'index.html', 2000);
    });
    window.onload = cargarClientes;
</script>
</body>
</html>
