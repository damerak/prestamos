<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Préstamos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #121420; --card-bg: #1b1f2d; --input-bg: #24293a; --text-color: #e0e0e0; --accent-color: #5d5fef; --border-color: #2e344a; --danger: #ef4444; --success: #4ade80; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 40px 20px; }
        .container { width: 100%; max-width: 1100px; margin: 0 auto; animation: fadeIn 0.6s ease; }
        .btn-regresar { display: inline-block; margin-bottom: 20px; color: var(--accent-color); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        h2 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; color: #8b8ea1; font-weight: 600; }
        .header-actions { display: flex; gap: 15px; margin-bottom: 30px; align-items: center; }
        #buscador { flex: 1; padding: 15px 20px; background-color: var(--input-bg); border: 1px solid var(--border-color); border-radius: 8px; color: white; outline: none; }
        .barrio-card { background-color: var(--card-bg); border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border-color); }
        .barrio-header { padding: 20px; background-color: #24293a; cursor: pointer; display: flex; justify-content: space-between; font-weight: 600; color: var(--accent-color); }
        .barrio-content { display: none; padding: 15px; flex-direction: column; gap: 15px; }
        .barrio-card.active .barrio-content { display: flex; }
        .prestamo-item { background-color: var(--bg-color); border: 1px solid var(--border-color); border-radius: 10px; padding: 20px; display: grid; grid-template-columns: 40px 1fr auto; align-items: center; gap: 15px; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .label { font-size: 0.65rem; color: #7a829a; text-transform: uppercase; }
        .value { font-size: 0.9rem; font-weight: 500; }
        .progress-container { grid-column: 1 / -1; height: 6px; background: #24293a; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent-color), var(--success)); transition: width 0.5s; }
        .btn-abonar { padding: 10px 20px; background-color: var(--accent-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .dropdown { position: relative; }
        .dropdown-content { display: none; position: absolute; right: 0; top: 45px; background-color: #24293a; min-width: 180px; z-index: 1000; border-radius: 8px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dropdown-content button { width: 100%; padding: 12px 15px; background: none; border: none; color: white; text-align: left; cursor: pointer; }
        .show { display: block !important; }
        #iframeImpresion { position: absolute; width: 0; height: 0; border: none; visibility: hidden; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="btn-regresar">← Volver al Inicio</a>
    <h2>Gestión de Préstamos Activos</h2>
    <div class="header-actions"><input type="text" id="buscador" placeholder="Buscar por nombre..."></div>
    <div id="listaBarrios"></div>
</div>
<iframe id="iframeImpresion"></iframe>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCarhhvBeuECGQL_6VU-huoK0hqu3q_lZ4", authDomain: "prestamos-ba860.firebaseapp.com", projectId: "prestamos-ba860", storageBucket: "prestamos-ba860.firebasestorage.app", messagingSenderId: "854942370995", appId: "1:854942370995:web:06aba4cd63c03d12fb34c6" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let prestamos = [];
    let clientes = [];

    onSnapshot(collection(db, "clientes"), (s) => { clientes = s.docs.map(d => d.data()); renderizar(); });
    onSnapshot(collection(db, "prestamos"), (s) => { prestamos = s.docs.map(d => ({ id_db: d.id, ...d.data() })); renderizar(); });

    function renderizar() {
        const contenedor = document.getElementById('listaBarrios');
        contenedor.innerHTML = "";
        const filtro = document.getElementById('buscador').value.toLowerCase();
        let datos = prestamos.map(p => {
            const cli = clientes.find(c => c.nombres === p.cliente) || { barrio: "Sin Barrio" };
            const totalOrig = parseNum(p.total);
            const progreso = totalOrig > 0 ? ((totalOrig - p.saldo) / totalOrig) * 100 : 0;
            return { ...p, barrio: cli.barrio, progreso };
        });
        if (filtro) datos = datos.filter(d => d.cliente.toLowerCase().includes(filtro));
        const grupos = datos.reduce((acc, curr) => { if (!acc[curr.barrio]) acc[curr.barrio] = []; acc[curr.barrio].push(curr); return acc; }, {});
        for (const barrio in grupos) {
            const div = document.createElement('div'); div.className = 'barrio-card';
            div.innerHTML = `<div class="barrio-header" onclick="this.parentElement.classList.toggle('active')"><span>📍 ${barrio.toUpperCase()}</span><span>${grupos[barrio].length} Préstamos</span></div>
                <div class="barrio-content">${grupos[barrio].map(p => `
                    <div class="prestamo-item">
                        <div></div>
                        <div class="info-grid">
                            <div><span class="label">Cliente</span><br><span class="value">${p.cliente}</span></div>
                            <div><span class="label">Saldo</span><br><span class="value" style="color:var(--success); font-weight:bold;">${formatear(p.saldo)}</span></div>
                            <div class="progress-container"><div class="progress-bar" style="width: ${p.progreso}%"></div></div>
                        </div>
                        <div class="dropdown">
                            <button class="btn-abonar" onclick="toggleMenu(event, '${p.id_db}')">Opciones</button>
                            <div id="menu-${p.id_db}" class="dropdown-content">
                                <button onclick="procesarPago('${p.id_db}', 'cuota')">Abonar Cuota</button>
                                <button onclick="procesarPago('${p.id_db}', 'total')">Abono Total</button>
                                <button style="color:var(--danger)" onclick="eliminar('${p.id_db}')">Eliminar</button>
                            </div>
                        </div>
                    </div>`).join('')}</div>`;
            contenedor.appendChild(div);
        }
    }

    window.procesarPago = async function(id_db, tipo) {
        let p = prestamos.find(x => x.id_db === id_db);
        let valor = (tipo === 'cuota') ? (parseNum(p.total) / p.cuotas) : p.saldo;
        let nSaldo = Math.max(0, p.saldo - valor);
        await addDoc(collection(db, "historial_impresiones"), { tipo: 'abono', cliente: p.cliente, monto: valor, saldo: nSaldo, fecha: new Date().toLocaleDateString(), hora: new Date().toLocaleTimeString() });
        generarRecibo(p, valor, nSaldo);
        if (nSaldo === 0) await deleteDoc(doc(db, "prestamos", id_db));
        else await updateDoc(doc(db, "prestamos", id_db), { saldo: nSaldo });
    }

    function generarRecibo(p, abono, nuevoSaldo) {
        const emp = JSON.parse(localStorage.getItem('datosEmpresa')) || { nombre: "MI NEGOCIO", telefono: "---", ciudad: "---" };
        const iframe = document.getElementById('iframeImpresion');
        const win = iframe.contentWindow;
        const doc = win.document;
        doc.open();
        doc.write(`<html><head><style>@page { margin: 0; size: auto; } body { width: 48mm; margin: 0 auto; padding: 10px 0; font-family: 'Courier New', monospace; font-size: 12px; text-align: center; line-height: 1.2; } .bold { font-weight: bold; } .sep { margin: 5px 0; } .box { border: 1px solid #000; padding: 5px; margin: 8px 0; }</style></head>
            <body><div class="bold">${emp.nombre.toUpperCase()}</div><div>TEL: ${emp.telefono}</div><div class="sep">--------------------------</div><div class="bold">RECIBO DE ABONO</div><div style="text-align:left">FECHA: ${new Date().toLocaleDateString()}<br>CLIENTE: ${p.cliente.toUpperCase()}</div><div class="box bold">PAGO: ${formatear(abono)}</div><div class="bold">SALDO: ${formatear(nuevoSaldo)}</div><div style="margin-top:10px;">Gracias por su pago</div><div style="height:40px">.</div></body></html>`);
        doc.close();
        setTimeout(() => { win.focus(); win.print(); }, 500);
    }

    window.toggleMenu = (e, id) => { e.stopPropagation(); document.getElementById(`menu-${id}`).classList.toggle('show'); }
    function parseNum(str) { return parseFloat(str.toString().replace(/\./g, "").replace(/[^0-9.-]+/g,"")) || 0; }
    function formatear(n) { return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(n); }
    document.getElementById('buscador').addEventListener('input', renderizar);
</script>
</body>
</html>
