<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Préstamos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #121420; --card-bg: #1b1f2d; --input-bg: #24293a; --text-color: #e0e0e0; --accent-color: #5d5fef; --accent-hover: #4a4cd4; --border-color: #2e344a; --danger: #ef4444; --success: #4ade80; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 40px 20px; }
        .container { width: 100%; max-width: 1100px; margin: 0 auto; animation: fadeIn 0.6s ease; }
        
        .btn-regresar { display: inline-block; margin-bottom: 20px; color: var(--accent-color); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .btn-regresar:hover { color: white; transform: translateX(-5px); }

        h2 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; color: #8b8ea1; font-weight: 600; }
        
        .header-actions { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .search-box { display: flex; gap: 15px; align-items: center; }
        #buscador { flex: 1; padding: 15px 20px; background-color: var(--input-bg); border: 1px solid var(--border-color); border-radius: 8px; color: white; outline: none; }
        
        .filter-options { display: flex; gap: 20px; align-items: center; padding: 0 5px; }
        .filter-options label { font-size: 0.85rem; display: flex; align-items: center; gap: 8px; cursor: pointer; color: #8b8ea1; }
        .filter-options input[type="checkbox"] { accent-color: var(--accent-color); width: 18px; height: 18px; }

        #btn-eliminar-varios { 
            padding: 10px 20px; background-color: var(--danger); color: white; border: none; 
            border-radius: 8px; cursor: pointer; font-weight: 600; display: none;
        }

        /* Agrupación por Barrio */
        .barrio-group { margin-bottom: 15px; border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; background: #161a26; }
        .barrio-title { background: #24293a; padding: 12px 20px; cursor: pointer; color: var(--accent-color); font-weight: 600; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-color); }
        .barrio-items { display: none; padding: 10px; flex-direction: column; gap: 8px; }
        .barrio-group.active-barrio .barrio-items { display: flex; }

        /* Tarjeta Cliente */
        .cliente-item { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; overflow: hidden; }
        .cliente-header { padding: 15px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .cliente-header:hover { background-color: #24293a; }
        .cliente-nombre { flex: 1; font-weight: 600; font-size: 1rem; }
        
        .cliente-content { display: none; padding: 20px; background-color: #1a1e2b; border-top: 1px solid var(--border-color); }
        .cliente-item.active .cliente-content { display: block; }

        .chk-prestamo { width: 19px; height: 19px; cursor: pointer; accent-color: var(--accent-color); }

        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .label { font-size: 0.65rem; color: #7a829a; text-transform: uppercase; margin-bottom: 3px; display: block; }
        .value { font-size: 0.95rem; font-weight: 500; }
        .saldo-destacado { color: var(--success); font-weight: 700; }
        
        .progress-container { height: 6px; background: #24293a; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent-color), var(--success)); transition: width 0.5s; }

        .acciones-pago { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .btn-opcion { padding: 9px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 0.8rem; transition: 0.2s; }
        .btn-cuota { background: var(--accent-color); color: white; }
        .btn-total { background: #3b3d91; color: white; }
        .btn-otro { background: #2e344a; color: white; }
        .btn-eliminar { background: #451a1a; color: #ff8080; border: 1px solid #632525; }
        .btn-opcion:hover { opacity: 0.8; transform: translateY(-1px); }

        .input-otro-valor { display: none; margin-top: 15px; background: var(--input-bg); padding: 12px; border-radius: 8px; align-items: center; gap: 10px; border: 1px solid var(--accent-color); width: fit-content; }
        .input-otro-valor input { width: 12ch; padding: 8px; border-radius: 5px; border: 1px solid var(--border-color); background: #121420; color: white; outline: none; }
        .btn-confirm { background: var(--success); color: #121420; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        .show-flex { display: flex !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="btn-regresar">← Volver al Inicio</a>
    <h2>Gestión de Préstamos Activos</h2>
    
    <div class="header-actions">
        <div class="search-box">
            <input type="text" id="buscador" placeholder="Buscar por nombre, cédula o barrio...">
            <button id="btn-eliminar-varios" onclick="eliminarSeleccionados()">Eliminar Seleccionados</button>
        </div>
        <div class="filter-options">
            <!-- Los eventos 'change' ahora disparan la renderización correctamente -->
            <label><input type="checkbox" id="chk-ordenar-az"> Ordenar A-Z</label>
            <label><input type="checkbox" id="chk-agrupar-barrio"> Agrupar por Barrio</label>
        </div>
    </div>

    <div id="listaPrestamos"></div>
</div>

<iframe id="iframeImpresion" style="display:none"></iframe>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCarhhvBeuECGQL_6VU-huoK0hqu3q_lZ4",
        authDomain: "prestamos-ba860.firebaseapp.com",
        projectId: "prestamos-ba860",
        storageBucket: "prestamos-ba860.firebasestorage.app",
        messagingSenderId: "854942370995",
        appId: "1:854942370995:web:06aba4cd63c03d12fb34c6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let prestamos = [];
    let clientes = [];

    onSnapshot(collection(db, "clientes"), (snapshot) => {
        clientes = snapshot.docs.map(doc => ({ id_db: doc.id, ...doc.data() }));
        renderizar();
    });

    onSnapshot(collection(db, "prestamos"), (snapshot) => {
        prestamos = snapshot.docs.map(doc => ({ id_db: doc.id, ...doc.data() }));
        renderizar();
    });

    function renderizar() {
        const contenedor = document.getElementById('listaPrestamos');
        contenedor.innerHTML = "";
        const filtro = document.getElementById('buscador').value.toLowerCase();
        const ordenarAZ = document.getElementById('chk-ordenar-az').checked;
        const agruparBarrio = document.getElementById('chk-agrupar-barrio').checked;
        
        // 1. Cruzar datos de préstamos con información de clientes
        let datos = prestamos.map(p => {
            const cli = clientes.find(c => c.nombres === p.cliente) || { barrio: "Sin Barrio", cedula: "N/A" };
            const totalOriginal = parseNum(p.total);
            const progresoVal = totalOriginal > 0 ? ((totalOriginal - p.saldo) / totalOriginal) * 100 : 0;
            return { ...p, barrio: cli.barrio, cedula: cli.cedula, progreso: progresoVal };
        });

        // 2. Aplicar filtro de búsqueda
        if (filtro) {
            datos = datos.filter(d => 
                d.cliente.toLowerCase().includes(filtro) || 
                d.barrio.toLowerCase().includes(filtro)
            );
        }

        // 3. Aplicar Orden A-Z si está marcado
        if (ordenarAZ) {
            datos.sort((a, b) => a.cliente.localeCompare(b.cliente));
        }

        // 4. Renderizar (Agrupado o Lista simple)
        if (agruparBarrio) {
            const grupos = datos.reduce((acc, curr) => { 
                const b = curr.barrio || "Sin Barrio";
                if (!acc[b]) acc[b] = []; 
                acc[b].push(curr); 
                return acc; 
            }, {});

            // Ordenar los nombres de los barrios alfabéticamente
            const barriosOrdenados = Object.keys(grupos).sort();

            barriosOrdenados.forEach(barrio => {
                const divBarrio = document.createElement('div');
                divBarrio.className = 'barrio-group';
                divBarrio.innerHTML = `
                    <div class="barrio-title" onclick="this.parentElement.classList.toggle('active-barrio')">
                        <span>📍 ${barrio.toUpperCase()}</span>
                        <span>${grupos[barrio].length} Clientes ▾</span>
                    </div>
                    <div class="barrio-items"></div>
                `;
                const itemsCont = divBarrio.querySelector('.barrio-items');
                grupos[barrio].forEach(p => itemsCont.appendChild(crearElementoCliente(p)));
                contenedor.appendChild(divBarrio);
            });
        } else {
            // Lista simple
            const listContainer = document.createElement('div');
            listContainer.style.display = "flex";
            listContainer.style.flexDirection = "column";
            listContainer.style.gap = "8px";
            datos.forEach(p => listContainer.appendChild(crearElementoCliente(p)));
            contenedor.appendChild(listContainer);
        }
        window.manejarCheckboxes();
    }

    function crearElementoCliente(p) {
        const div = document.createElement('div');
        div.className = 'cliente-item';
        div.innerHTML = `
            <div class="cliente-header" onclick="this.parentElement.classList.toggle('active')">
                <input type="checkbox" class="chk-prestamo" value="${p.id_db}" onclick="event.stopPropagation(); window.manejarCheckboxes()">
                <span class="cliente-nombre">${p.cliente}</span>
                <span style="font-size:0.75rem; color:#7a829a">Ver info ▾</span>
            </div>
            <div class="cliente-content">
                <div class="info-grid">
                    <div><span class="label">Total a Pagar</span><span class="value">${formatear(parseNum(p.total))}</span></div>
                    <div><span class="label">Cuota Sugerida</span><span class="value">${formatear(parseNum(p.total) / p.cuotas)}</span></div>
                    <div><span class="label">Saldo Actual</span><span class="value saldo-destacado">${formatear(p.saldo)}</span></div>
                    <div><span class="label">Estado de Pago</span><span class="value" style="color:var(--success)">${Math.round(p.progreso)}%</span></div>
                </div>
                <div class="progress-container"><div class="progress-bar" style="width: ${p.progreso}%"></div></div>
                
                <div class="acciones-pago">
                    <button class="btn-opcion btn-cuota" onclick="window.procesarPago('${p.id_db}', 'cuota')">Abonar Cuota</button>
                    <button class="btn-opcion btn-total" onclick="window.procesarPago('${p.id_db}', 'total')">Abono Total</button>
                    <button class="btn-opcion btn-otro" onclick="window.mostrarOtroValor('${p.id_db}')">Otro Valor</button>
                    <button class="btn-opcion btn-eliminar" onclick="window.eliminar('${p.id_db}')">Eliminar</button>
                </div>

                <div class="input-otro-valor" id="otro-box-${p.id_db}">
                    <input type="text" id="otro-input-${p.id_db}" placeholder="Monto..." oninput="window.aplicarMascara(this)">
                    <button class="btn-confirm" onclick="window.procesarPago('${p.id_db}', 'otro')">OK</button>
                </div>
            </div>
        `;
        return div;
    }

    // --- FUNCIONES GLOBALES ---

    window.manejarCheckboxes = function() {
        const seleccionados = document.querySelectorAll('.chk-prestamo:checked').length;
        const btnEliminar = document.getElementById('btn-eliminar-varios');
        btnEliminar.style.display = seleccionados > 0 ? 'block' : 'none';
    };

    window.eliminarSeleccionados = async function() {
        const seleccionados = Array.from(document.querySelectorAll('.chk-prestamo:checked')).map(cb => cb.value);
        if(confirm(`¿Deseas eliminar permanentemente estos ${seleccionados.length} préstamos?`)) {
            const batch = writeBatch(db);
            seleccionados.forEach(id => batch.delete(doc(db, "prestamos", id)));
            await batch.commit();
        }
    };

    window.procesarPago = async function(id_db, tipo) {
        let p = prestamos.find(x => x.id_db === id_db);
        if (!p) return;

        let valorAbono = 0;
        if (tipo === 'cuota') valorAbono = parseNum(p.total) / p.cuotas;
        else if (tipo === 'total') valorAbono = p.saldo;
        else valorAbono = parseFloat(document.getElementById(`otro-input-${id_db}`).value.replace(/\./g, "")) || 0;

        if (valorAbono > 0) {
            let nuevoSaldo = Math.max(0, p.saldo - valorAbono);
            try {
                await addDoc(collection(db, "historial_impresiones"), {
                    tipo: nuevoSaldo === 0 ? 'cancelacion' : 'abono',
                    cliente: p.cliente,
                    monto: valorAbono,
                    saldo: nuevoSaldo,
                    fecha: new Date().toLocaleDateString(),
                    hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
                });
                generarRecibo(p, valorAbono, nuevoSaldo);
                if (nuevoSaldo === 0) await deleteDoc(doc(db, "prestamos", id_db));
                else await updateDoc(doc(db, "prestamos", id_db), { saldo: nuevoSaldo });
            } catch (e) { alert("Error al guardar el pago"); }
        }
    };

    window.mostrarOtroValor = function(id) {
        document.getElementById(`otro-box-${id}`).classList.toggle('show-flex');
    };

    window.eliminar = async function(id_db) {
        if(confirm("¿Seguro que quieres borrar este préstamo?")) {
            await deleteDoc(doc(db, "prestamos", id_db));
        }
    };

    window.aplicarMascara = function(i) { 
        let v = i.value.replace(/\D/g, ""); 
        i.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, "."); 
        i.style.width = i.value.length > 0 ? (i.value.length + 3) + "ch" : "12ch";
    };

    function parseNum(str) { return str ? parseFloat(str.toString().replace(/\./g, "").replace(/[^0-9.-]+/g,"")) : 0; }
    function formatear(n) { return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(n); }

    function generarRecibo(p, abono, nuevoSaldo) {
        const empresa = JSON.parse(localStorage.getItem('datosEmpresa')) || { nombre: "MI NEGOCIO", telefono: "---", ciudad: "---" };
        const win = document.getElementById('iframeImpresion').contentWindow;
        win.document.open();
        win.document.write(`
            <html><body style="font-family:monospace; width:48mm; font-size:12px; text-align:center; padding:10px 0;">
                <b>${empresa.nombre}</b><br>${empresa.ciudad}<br>--------------------------<br>
                COMPROBANTE DE PAGO<br>--------------------------<br>
                <div style="text-align:left">
                FECHA: ${new Date().toLocaleDateString()}<br>
                CLIENTE: ${p.cliente.toUpperCase()}<br>
                PAGO: ${formatear(abono)}<br>
                SALDO RESTANTE: ${formatear(nuevoSaldo)}</div>
                <br>¡Muchas Gracias!<br>.<br>.
            </body></html>`);
        win.document.close();
        setTimeout(() => { win.focus(); win.print(); }, 500);
    }

    // Escuchar cambios en inputs y checkboxes
    document.getElementById('buscador').addEventListener('input', renderizar);
    document.getElementById('chk-ordenar-az').addEventListener('change', renderizar);
    document.getElementById('chk-agrupar-barrio').addEventListener('change', renderizar);

</script>
</body>
</html>
